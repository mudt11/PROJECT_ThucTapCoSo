services:
  # --- DATABASE ---
  db:
    image: mysql:8.0
    container_name: music_web_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: hdt131esc
      MYSQL_DATABASE: music_app_db
    ports:
      - "3307:3306" # Map ra port 3307 để không đụng MySQL trên máy thật
    volumes:
      - mysql_data:/var/lib/mysql
      # Dòng 2 (MỚI): Map file SQL để tự động import
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongo:
    image: mongo:6
    container_name: music_web_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- BACKEND ---
  server:
    build: ./Server
    container_name: music_web_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env
    # --- CẤU HÌNH TỰ ĐỘNG CẬP NHẬT CODE (HOT RELOAD) ---
    volumes:
      - ./Server:/app
      - /app/node_modules
      - ./Server/src/public:/app/src/public
    command: npm run dev

  # --- FRONTEND ---
  ui:
    build: ./UI
    container_name: music_web_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - server
    # --- CẤU HÌNH TỰ ĐỘNG CẬP NHẬT CODE (HOT RELOAD) ---
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./UI:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  mysql_data:
  mongo_data:
